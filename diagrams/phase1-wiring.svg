<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace">
  <style>
    .pcb-pi { fill: #2A6344; }
    .pcb-amp { fill: #5B3888; }
    .pcb-enc { fill: #2B5580; }
    .pcb-text { fill: #E2E0D8; }
    .pcb-dim { fill: rgba(255,255,255,0.45); }
    .wire-5v { stroke: #C83E34; }
    .wire-gnd { stroke: #4A4A4A; }
    .wire-i2s { stroke: #228075; }
    .wire-3v3 { stroke: #C27028; }
    .wire-gpio { stroke: #3A60A0; }
    .wire-spk { stroke: #9A6228; }
    .dot-5v { fill: #E05A4F; }
    .dot-gnd { fill: #666; }
    .dot-i2s { fill: #2DA090; }
    .dot-3v3 { fill: #E08838; }
    .dot-gpio { fill: #5078C0; }
    .dot-spk { fill: #B87333; }
    .label { fill: #2A3038; font-size: 11px; }
    .label-sec { fill: #6B7280; font-size: 9px; }
    .spk-fill { fill: #EAE4D7; }
    .spk-stroke { stroke: #D1C9B5; fill: none; }
    .spk-cone { stroke: #6B7280; fill: none; }
    .spk-cap { fill: #6B7280; }
    text { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace; }
  </style>

  <!-- Background -->
  <rect width="920" height="480" fill="#F3EEE4" rx="10"/>

  <!-- ── Raspberry Pi 3B ── -->
  <rect x="25" y="18" width="258" height="430" rx="10" class="pcb-pi"/>
  <text x="154" y="48" text-anchor="middle" class="pcb-text" font-size="13" font-weight="700">RASPBERRY PI 3B</text>
  <text x="154" y="65" text-anchor="middle" class="pcb-dim" font-size="10">Model B V1.2</text>

  <!-- I2S section label -->
  <text x="45" y="100" class="pcb-dim" font-size="9" font-weight="700">I²S AUDIO</text>

  <!-- I2S pin labels (Pi side) -->
  <text x="270" y="118" text-anchor="end" class="pcb-text" font-size="10">Pin 2 · 5V</text>
  <text x="270" y="147" text-anchor="end" class="pcb-text" font-size="10">Pin 6 · GND</text>
  <text x="270" y="176" text-anchor="end" class="pcb-text" font-size="10">Pin 12 · GPIO18</text>
  <text x="270" y="205" text-anchor="end" class="pcb-text" font-size="10">Pin 35 · GPIO19</text>
  <text x="270" y="234" text-anchor="end" class="pcb-text" font-size="10">Pin 40 · GPIO21</text>

  <!-- Divider -->
  <line x1="41" y1="258" x2="267" y2="258" stroke="rgba(255,255,255,0.18)" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Volume encoder section label -->
  <text x="45" y="285" class="pcb-dim" font-size="9" font-weight="700">VOLUME ENCODER</text>

  <!-- Encoder pin labels (Pi side) -->
  <text x="270" y="308" text-anchor="end" class="pcb-text" font-size="10">Pin 1 · 3V3</text>
  <text x="270" y="337" text-anchor="end" class="pcb-text" font-size="10">Pin 9 · GND</text>
  <text x="270" y="366" text-anchor="end" class="pcb-text" font-size="10">Pin 11 · GPIO17</text>
  <text x="270" y="395" text-anchor="end" class="pcb-text" font-size="10">Pin 13 · GPIO27</text>
  <text x="270" y="424" text-anchor="end" class="pcb-text" font-size="10">Pin 15 · GPIO22</text>

  <!-- Bottom notes -->
  <text x="154" y="420" text-anchor="middle" class="pcb-dim" font-size="9">← 5V micro-USB power</text>
  <text x="154" y="438" text-anchor="middle" class="pcb-dim" font-size="9">13 GPIO pins free for Phase 2</text>

  <!-- ── MAX98357A ── -->
  <rect x="532" y="55" width="192" height="222" rx="10" class="pcb-amp"/>
  <text x="628" y="79" text-anchor="middle" class="pcb-text" font-size="12" font-weight="700">MAX98357A</text>
  <text x="628" y="96" text-anchor="middle" class="pcb-dim" font-size="10">I²S Mono Amp</text>

  <!-- Amp input labels -->
  <text x="545" y="118" class="pcb-text" font-size="10">VIN</text>
  <text x="545" y="147" class="pcb-text" font-size="10">GND</text>
  <text x="545" y="176" class="pcb-text" font-size="10">BCLK</text>
  <text x="545" y="205" class="pcb-text" font-size="10">LRCLK</text>
  <text x="545" y="234" class="pcb-text" font-size="10">DIN</text>

  <!-- Amp divider -->
  <line x1="546" y1="245" x2="710" y2="245" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Amp output labels -->
  <text x="711" y="259" text-anchor="end" class="pcb-text" font-size="10">SPK+</text>
  <text x="711" y="268" text-anchor="end" class="pcb-text" font-size="10">SPK−</text>

  <!-- Amp spec -->
  <text x="628" y="266" text-anchor="middle" class="pcb-dim" font-size="9">3.2W @ 4Ω</text>

  <!-- ── KY-040 Encoder ── -->
  <rect x="532" y="286" width="192" height="164" rx="10" class="pcb-enc"/>
  <text x="628" y="306" text-anchor="middle" class="pcb-text" font-size="12" font-weight="700">KY-040</text>
  <text x="628" y="323" text-anchor="middle" class="pcb-dim" font-size="10">Rotary Encoder</text>

  <!-- Encoder pin labels -->
  <text x="545" y="308" class="pcb-text" font-size="10">+</text>
  <text x="545" y="337" class="pcb-text" font-size="10">GND</text>
  <text x="545" y="366" class="pcb-text" font-size="10">CLK</text>
  <text x="545" y="395" class="pcb-text" font-size="10">DT</text>
  <text x="545" y="424" class="pcb-text" font-size="10">SW</text>

  <!-- ── Speaker ── -->
  <circle cx="842" cy="178" r="48" class="spk-fill" stroke="#D1C9B5" stroke-width="2"/>
  <circle cx="842" cy="178" r="41" class="spk-cone" stroke-width="0.8"/>
  <circle cx="842" cy="178" r="30" class="spk-cone" stroke-width="1"/>
  <circle cx="842" cy="178" r="9" class="spk-cap"/>
  <text x="842" y="242" text-anchor="middle" class="label" font-size="11" font-weight="700">VISATON</text>
  <text x="842" y="256" text-anchor="middle" class="label-sec">FR 10 HM · 4Ω</text>

  <!-- Speaker input labels -->
  <text x="786" y="159" text-anchor="end" class="label" font-size="11">+</text>
  <text x="786" y="200" text-anchor="end" class="label" font-size="11">−</text>

  <!-- ── I2S Wires (Pi → Amp) ── -->
  <line x1="283" y1="114" x2="532" y2="114" stroke-width="3" stroke-linecap="round" class="wire-5v"/>
  <line x1="283" y1="143" x2="532" y2="143" stroke-width="3" stroke-linecap="round" class="wire-gnd"/>
  <line x1="283" y1="172" x2="532" y2="172" stroke-width="3" stroke-linecap="round" class="wire-i2s"/>
  <line x1="283" y1="201" x2="532" y2="201" stroke-width="3" stroke-linecap="round" class="wire-i2s"/>
  <line x1="283" y1="230" x2="532" y2="230" stroke-width="3" stroke-linecap="round" class="wire-i2s"/>

  <!-- I2S dots (Pi side) -->
  <circle cx="283" cy="114" r="5" class="dot-5v"/>
  <circle cx="283" cy="143" r="5" class="dot-gnd"/>
  <circle cx="283" cy="172" r="5" class="dot-i2s"/>
  <circle cx="283" cy="201" r="5" class="dot-i2s"/>
  <circle cx="283" cy="230" r="5" class="dot-i2s"/>

  <!-- I2S dots (Amp side) -->
  <circle cx="532" cy="114" r="5" class="dot-5v"/>
  <circle cx="532" cy="143" r="5" class="dot-gnd"/>
  <circle cx="532" cy="172" r="5" class="dot-i2s"/>
  <circle cx="532" cy="201" r="5" class="dot-i2s"/>
  <circle cx="532" cy="230" r="5" class="dot-i2s"/>

  <!-- ── Encoder Wires (Pi → Encoder) ── -->
  <line x1="283" y1="304" x2="532" y2="304" stroke-width="3" stroke-linecap="round" class="wire-3v3"/>
  <line x1="283" y1="333" x2="532" y2="333" stroke-width="3" stroke-linecap="round" class="wire-gnd"/>
  <line x1="283" y1="362" x2="532" y2="362" stroke-width="3" stroke-linecap="round" class="wire-gpio"/>
  <line x1="283" y1="391" x2="532" y2="391" stroke-width="3" stroke-linecap="round" class="wire-gpio"/>
  <line x1="283" y1="420" x2="532" y2="420" stroke-width="3" stroke-linecap="round" class="wire-gpio"/>

  <!-- Encoder dots (Pi side) -->
  <circle cx="283" cy="304" r="5" class="dot-3v3"/>
  <circle cx="283" cy="333" r="5" class="dot-gnd"/>
  <circle cx="283" cy="362" r="5" class="dot-gpio"/>
  <circle cx="283" cy="391" r="5" class="dot-gpio"/>
  <circle cx="283" cy="420" r="5" class="dot-gpio"/>

  <!-- Encoder dots (Encoder side) -->
  <circle cx="532" cy="304" r="5" class="dot-3v3"/>
  <circle cx="532" cy="333" r="5" class="dot-gnd"/>
  <circle cx="532" cy="362" r="5" class="dot-gpio"/>
  <circle cx="532" cy="391" r="5" class="dot-gpio"/>
  <circle cx="532" cy="420" r="5" class="dot-gpio"/>

  <!-- ── Speaker Wires (Amp → Speaker) ── -->
  <line x1="724" y1="255" x2="796" y2="155" stroke-width="3" stroke-linecap="round" class="wire-spk"/>
  <line x1="724" y1="264" x2="796" y2="196" stroke-width="3" stroke-linecap="round" class="wire-spk"/>

  <!-- Speaker dots (Amp side) -->
  <circle cx="724" cy="255" r="5" class="dot-spk"/>
  <circle cx="724" cy="264" r="5" class="dot-spk"/>

  <!-- Speaker dots (Speaker side) -->
  <circle cx="796" cy="155" r="5" class="dot-spk"/>
  <circle cx="796" cy="196" r="5" class="dot-spk"/>

  <!-- ── Legend ── -->
  <rect x="25" y="460" width="22" height="4" rx="2" fill="#C83E34"/>
  <text x="52" y="464" class="label-sec">5V Power</text>
  <rect x="120" y="460" width="22" height="4" rx="2" fill="#C27028"/>
  <text x="147" y="464" class="label-sec">3.3V Power</text>
  <rect x="220" y="460" width="22" height="4" rx="2" fill="#4A4A4A"/>
  <text x="247" y="464" class="label-sec">Ground</text>
  <rect x="310" y="460" width="22" height="4" rx="2" fill="#228075"/>
  <text x="337" y="464" class="label-sec">I²S Signal</text>
  <rect x="410" y="460" width="22" height="4" rx="2" fill="#3A60A0"/>
  <text x="437" y="464" class="label-sec">Encoder GPIO</text>
  <rect x="530" y="460" width="22" height="4" rx="2" fill="#9A6228"/>
  <text x="557" y="464" class="label-sec">Speaker</text>
</svg>
