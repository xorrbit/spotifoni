<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace">
  <style>
    text { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace; }
    .hdr { fill: #6B7280; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
    .row-text { fill: #2A3038; font-size: 12px; }
    .row-mono { fill: #6B7280; font-size: 11px; }
    .row-dim { fill: #6B7280; font-size: 11px; font-style: italic; }
    .accent { fill: #B87333; }
    .section { fill: #B87333; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; }
    .border { stroke: #D1C9B5; }
    .stripe { fill: #EAE4D7; }
    .cat-enc { fill: #2B5580; }
    .cat-led { fill: #2A6344; }
    .cat-bus { fill: #5B3888; }
    .cat-dot { r: 4; }
  </style>

  <!-- Background -->
  <rect width="720" height="520" fill="#F3EEE4" rx="10"/>

  <!-- Title -->
  <text x="24" y="28" class="accent" font-size="11" font-weight="600" letter-spacing="0.15em">SPOTIFONI</text>
  <text x="24" y="50" fill="#2A3038" font-size="18" font-weight="350">Phase 2 — Full GPIO Allocation</text>
  <text x="24" y="68" fill="#6B7280" font-size="11">All four encoders + status LEDs. Encoder 1 assignments carry over from Phase 1 unchanged.</text>

  <!-- Table header -->
  <line x1="24" y1="95" x2="696" y2="95" class="border" stroke-width="1"/>
  <text x="40" y="90" class="hdr">Function</text>
  <text x="320" y="90" class="hdr">GPIO Pins</text>
  <text x="540" y="90" class="hdr">Header Pins</text>

  <!-- Row stripes -->
  <rect x="24" y="99" width="672" height="32" class="stripe" rx="0"/>
  <rect x="24" y="163" width="672" height="32" class="stripe" rx="0"/>
  <rect x="24" y="227" width="672" height="32" class="stripe" rx="0"/>
  <rect x="24" y="291" width="672" height="32" class="stripe" rx="0"/>
  <rect x="24" y="355" width="672" height="32" class="stripe" rx="0"/>
  <rect x="24" y="419" width="672" height="32" class="stripe" rx="0"/>

  <!-- Encoders section -->
  <!-- Row 1: Encoder 1 — Volume -->
  <circle cx="32" cy="117" class="cat-enc cat-dot"/>
  <text x="40" y="120" class="row-text">Encoder 1 — Volume</text>
  <text x="320" y="120" class="row-mono">GPIO 17, 27, 22</text>
  <text x="540" y="120" class="row-mono">Pin 11, 13, 15</text>
  <line x1="24" y1="131" x2="696" y2="131" class="border" stroke-width="0.5"/>

  <!-- Row 2: Encoder 2 — Previous -->
  <circle cx="32" cy="149" class="cat-enc cat-dot"/>
  <text x="40" y="152" class="row-text">Encoder 2 — Previous</text>
  <text x="320" y="152" class="row-mono">GPIO 5, 6, 13</text>
  <text x="540" y="152" class="row-mono">Pin 29, 31, 33</text>
  <line x1="24" y1="163" x2="696" y2="163" class="border" stroke-width="0.5"/>

  <!-- Row 3: Encoder 3 — Play/Pause -->
  <circle cx="32" cy="181" class="cat-enc cat-dot"/>
  <text x="40" y="184" class="row-text">Encoder 3 — Play/Pause</text>
  <text x="320" y="184" class="row-mono">GPIO 23, 24, 25</text>
  <text x="540" y="184" class="row-mono">Pin 16, 18, 22</text>
  <line x1="24" y1="195" x2="696" y2="195" class="border" stroke-width="0.5"/>

  <!-- Row 4: Encoder 4 — Next -->
  <circle cx="32" cy="213" class="cat-enc cat-dot"/>
  <text x="40" y="216" class="row-text">Encoder 4 — Next</text>
  <text x="320" y="216" class="row-mono">GPIO 12, 16, 26</text>
  <text x="540" y="216" class="row-mono">Pin 32, 36, 37</text>
  <line x1="24" y1="227" x2="696" y2="227" class="border" stroke-width="0.5"/>

  <!-- LEDs section -->
  <!-- Row 5: Power LED -->
  <circle cx="32" cy="245" class="cat-led cat-dot"/>
  <text x="40" y="248" class="row-text">Power LED (amber)</text>
  <text x="320" y="248" class="row-mono">GPIO 4</text>
  <text x="540" y="248" class="row-mono">Pin 7</text>
  <line x1="24" y1="259" x2="696" y2="259" class="border" stroke-width="0.5"/>

  <!-- Row 6: Bluetooth LED -->
  <circle cx="32" cy="277" class="cat-led cat-dot"/>
  <text x="40" y="280" class="row-text">Bluetooth LED (blue)</text>
  <text x="320" y="280" class="row-mono">GPIO 20</text>
  <text x="540" y="280" class="row-mono">Pin 38</text>
  <line x1="24" y1="291" x2="696" y2="291" class="border" stroke-width="0.5"/>

  <!-- Row 7: Spotify LED -->
  <circle cx="32" cy="309" class="cat-led cat-dot"/>
  <text x="40" y="312" class="row-text">Spotify LED (green)</text>
  <text x="320" y="312" class="row-mono">GPIO 10</text>
  <text x="540" y="312" class="row-mono">Pin 19</text>
  <line x1="24" y1="323" x2="696" y2="323" class="border" stroke-width="0.5"/>

  <!-- Buses section -->
  <!-- Row 8: I2S -->
  <circle cx="32" cy="341" class="cat-bus cat-dot"/>
  <text x="40" y="344" class="row-dim">I²S bus (allocated)</text>
  <text x="320" y="344" class="row-mono">GPIO 18, 19, 21</text>
  <text x="540" y="344" class="row-mono">Pin 12, 35, 40</text>
  <line x1="24" y1="355" x2="696" y2="355" class="border" stroke-width="0.5"/>

  <!-- Row 9: I2C -->
  <circle cx="32" cy="373" class="cat-bus cat-dot"/>
  <text x="40" y="376" class="row-dim">I²C for OLED (reserved)</text>
  <text x="320" y="376" class="row-mono">GPIO 2, 3</text>
  <text x="540" y="376" class="row-mono">Pin 3, 5</text>

  <!-- Legend -->
  <line x1="24" y1="410" x2="696" y2="410" class="border" stroke-width="1"/>
  <circle cx="40" cy="432" r="4" class="cat-enc"/>
  <text x="50" y="435" class="row-mono">Encoders (3 pins each: CLK, DT, SW)</text>
  <circle cx="40" cy="454" r="4" class="cat-led"/>
  <text x="50" y="457" class="row-mono">Status LEDs (1 pin each + 330Ω resistor)</text>
  <circle cx="40" cy="476" r="4" class="cat-bus"/>
  <text x="50" y="479" class="row-mono">Communication buses</text>

  <!-- Pin count summary -->
  <text x="24" y="508" fill="#6B7280" font-size="11">Total: 22 of 26 usable GPIO pins allocated — 4 remaining (GPIO 0, 1, 7, 8)</text>
</svg>
